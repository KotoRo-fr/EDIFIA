# ============================================================
# EDIFIA — Prometheus Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: edifia
  labels:
    app: edifia
    tier: monitoring
    component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edifia
      tier: monitoring
      component: prometheus
  template:
    metadata:
      labels:
        app: edifia
        tier: monitoring
        component: prometheus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55
          ports:
            - containerPort: 9090
              protocol: TCP
              name: http
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            limits:
              memory: "512Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "50m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
