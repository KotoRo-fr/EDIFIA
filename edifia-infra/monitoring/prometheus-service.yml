# ============================================================
# EDIFIA — Prometheus Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: edifia
  labels:
    app: edifia
    tier: monitoring
    component: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: edifia
    tier: monitoring
    component: prometheus
