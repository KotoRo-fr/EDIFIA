# ============================================================
# EDIFIA — Grafana Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: edifia
  labels:
    app: edifia
    tier: monitoring
    component: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: edifia
    tier: monitoring
    component: grafana
