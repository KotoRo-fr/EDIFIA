# ============================================================
# EDIFIA — Prometheus Alerting Rules
# ============================================================
groups:
  - name: edifia-alerts
    rules:
      # Backend down
      - alert: BackendDown
        expr: up{job="edifia-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend EDIFIA down"
          description: "Le backend EDIFIA ne repond pas depuis plus de 2 minutes."
          runbook_url: "https://wiki.edifia.local/runbooks/backend-down"

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Error rate > 5%"
          description: "Le taux d'erreur HTTP 5xx est superieur a 5% depuis 5 minutes (valeur actuelle: {{ $value | humanizePercentage }})."

      # High latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Latence p95 > 2 secondes"
          description: "La latence p95 des requetes est superieure a 2 secondes depuis 5 minutes (valeur actuelle: {{ $value }}s)."

      # Database connections high
      - alert: DBConnectionsHigh
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Connexions DB > 80%"
          description: "Le nombre de connexions actives a la base de donnees depasse 80% de la limite maximale."

      # Redis down
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis EDIFIA down"
          description: "Le service Redis ne repond pas depuis plus de 2 minutes."

      # Disk space low (PostgreSQL)
      - alert: PostgreSQLDiskSpaceLow
        expr: (pg_database_size / pg_settings_max_connections) > 0.85
        for: 10m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Espace disque PostgreSQL faible"
          description: "L'espace disque utilise par PostgreSQL est superieur a 85%."

      # Frontend down
      - alert: FrontendDown
        expr: up{job="edifia-frontend"} == 0
        for: 2m
        labels:
          severity: warning
          service: frontend
        annotations:
          summary: "Frontend EDIFIA down"
          description: "Le frontend EDIFIA ne repond pas depuis plus de 2 minutes."
