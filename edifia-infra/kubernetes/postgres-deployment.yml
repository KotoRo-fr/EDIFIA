# ============================================================
# EDIFIA — PostgreSQL Deployment (PostGIS)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: edifia
  labels:
    app: edifia
    tier: database
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edifia
      tier: database
      component: postgres
  template:
    metadata:
      labels:
        app: edifia
        tier: database
        component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: edifia-config
          env:
            - name: POSTGRES_USER
              value: "edifia"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edifia-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "edifia"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
