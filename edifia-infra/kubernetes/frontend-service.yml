# ============================================================
# EDIFIA — Frontend Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: edifia-frontend
  namespace: edifia
  labels:
    app: edifia
    tier: frontend
    component: web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: edifia
    tier: frontend
    component: web
