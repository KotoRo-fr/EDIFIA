# ============================================================
# EDIFIA — PostgreSQL Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: edifia
  labels:
    app: edifia
    tier: database
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: edifia
    tier: database
    component: postgres
