# ============================================================
# EDIFIA — Redis Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: edifia
  labels:
    app: edifia
    tier: cache
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edifia
      tier: cache
      component: redis
  template:
    metadata:
      labels:
        app: edifia
        tier: cache
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            limits:
              memory: "256Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
