# ============================================================
# EDIFIA — Redis Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: edifia
  labels:
    app: edifia
    tier: cache
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: edifia
    tier: cache
    component: redis
