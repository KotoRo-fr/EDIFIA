rule:
  code: "DTU-VENT-001"
  name: "Ventilation des locaux d'habitation"
  category: "dtu"
  description: "Verifie que les locaux d'habitation disposent d'une ventilation conforme au DTU 68.1"
  severity: "blocking"
  applicability:
    project_types: ["new_build", "extension_under_40"]
    zones: ["U", "AU"]
  formula:
    type: "comparison"
    input:
      - name: "surface_habitable"
        source: "variante.surface_habitable"
      - name: "debit_ventilation"
        source: "plu.cos_max"
    operation: "lte"
    expression: "surface_habitable <= debit_ventilation * 100"
  error_message:
    fr: "La ventilation du logement de {surface_habitable}m² ne respecte pas le DTU 68.1"
  source:
    document: "DTU 68.1"
    article: "Article 2 - Ventilation des logements"
    reference: "Arrete du 24 mars 1982 modifie"
  metadata:
    type_ventilation: "hygroreglable"
