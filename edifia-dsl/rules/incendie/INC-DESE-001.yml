rule:
  code: "INC-DESE-001"
  name: "Desenfumage si plus de 2 niveaux"
  category: "incendie"
  description: "Verifie que les batiments de plus de 2 niveaux disposent d'un systeme de desenfumage"
  severity: "blocking"
  applicability:
    project_types: ["new_build"]
  formula:
    type: "comparison"
    input:
      - name: "nb_niveaux"
        source: "batiment.niveaux"
      - name: "seuil_niveaux"
        source: "variante.niveaux"
    operation: "gte"
    expression: "nb_niveaux >= seuil_niveaux"
  error_message:
    fr: "Le batiment de {nb_niveaux} niveaux necessite un systeme de desenfumage (seuil: {seuil_niveaux})"
  source:
    document: "Code de la construction"
    article: "R.122-4 - Desenfumage"
    reference: "Arrete du 30 juin 1983"
