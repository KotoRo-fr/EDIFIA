rule:
  code: "RE2020-BBIO-002"
  name: "Bbio modere - zone H2"
  category: "re2020"
  description: "Verifie que l'indicateur Bbio respecte la valeur moderee pour les batiments en zone H2"
  severity: "blocking"
  applicability:
    project_types: ["new_build"]
    communes: ["74011"]
  formula:
    type: "comparison"
    input:
      - name: "bbio_h2"
        source: "variante.surface_habitable"
      - name: "bbio_max_h2"
        source: "plu.zone"
    operation: "lte"
    expression: "bbio_h2 <= bbio_max_h2"
  error_message:
    fr: "L'indicateur Bbio en zone H2 ({bbio_h2}) depasse la valeur limite ({bbio_max_h2})"
  source:
    document: "RE2020"
    article: "Article 4bis - Bbio zone H2"
    reference: "Arrete du 30 mars 2022"
