rule:
  code: "RE2020-CEP-002"
  name: "CEP modere - zone H2"
  category: "re2020"
  description: "Verifie que la CEP respecte la valeur moderee pour les batiments en zone H2"
  severity: "blocking"
  applicability:
    project_types: ["new_build"]
    communes: ["74011"]
  formula:
    type: "comparison"
    input:
      - name: "cep_h2"
        source: "variante.surface_habitable"
      - name: "cep_max_h2"
        source: "plu.zone"
    operation: "lte"
    expression: "cep_h2 <= cep_max_h2"
  error_message:
    fr: "La CEP en zone H2 ({cep_h2} kWh/m².an) depasse la valeur limite ({cep_max_h2} kWh/m².an)"
  source:
    document: "RE2020"
    article: "Article 3bis - CEP zone H2"
    reference: "Arrete du 30 mars 2022"
